# ============================================================
# Gateway ingress — applied to .230's cluster.
#
# TLS terminates HERE at .230's nginx ingress.
# cert-manager on .230 issues the cert via reunion-letsencrypt.
# .230 proxies plain HTTP to 192.168.1.176:80 (nginx stream
# proxy on .176, which forwards to the kind cluster NodePort).
# ============================================================

---
# HTTPS — TLS terminates at .230, proxies plain HTTP to .176
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-rag-gateway-https
  namespace: n8n-gateway
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "reunion-letsencrypt"
    # Do NOT use ssl-passthrough — TLS terminates here
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Backend is plain HTTP on .176
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    # Pass real protocol to n8n so it knows it's behind HTTPS
    nginx.ingress.kubernetes.io/proxy-set-header: "X-Forwarded-Proto https"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # WebSocket support for n8n push notifications
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - rawhideron.duckdns.org
      secretName: rawhideron-tls
  rules:
    - host: rawhideron.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-rag-backend-http
                port:
                  number: 80
