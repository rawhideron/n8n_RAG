# ============================================================
# Gateway ingress — applied to .230's cluster.
#
# Routes rawhideron.duckdns.org traffic to the n8n-rag kind
# cluster on 192.168.1.176.
#
# HTTPS: SSL passthrough (L4 TCP) — TLS is NOT terminated here.
#        cert-manager on .176 owns the certificate.
#
# HTTP:  Plain proxy — forwards to .176 so Let's Encrypt ACME
#        HTTP-01 challenges can reach cert-manager on .176.
# ============================================================

---
# HTTPS — SSL passthrough to .176:32512
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-rag-gateway-https
  namespace: n8n-gateway
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # Forward raw TLS to backend — no certificate needed on .230 for this domain
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough-proxy-protocol: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: rawhideron.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-rag-backend-https
                port:
                  number: 443

---
# HTTP — plain proxy to .176:30717 for ACME challenges
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n-rag-gateway-http
  namespace: n8n-gateway
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: rawhideron.duckdns.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-rag-backend-http
                port:
                  number: 80
