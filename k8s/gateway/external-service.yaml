# ============================================================
# Manual Service + Endpoints pointing to the n8n-rag kind cluster
# on 192.168.1.176.
#
# Applied to the .230 cluster — NOT the .176 cluster.
#
# nginx ingress on .230 uses these as the backend for
# rawhideron.duckdns.org traffic.
# ============================================================

---
# HTTPS backend — points to nginx stream proxy on .176 host (port 443)
# nginx on .176 forwards to the kind NodePort 32512 internally
apiVersion: v1
kind: Service
metadata:
  name: n8n-rag-backend-https
  namespace: n8n-gateway
spec:
  ports:
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP

---
apiVersion: v1
kind: Endpoints
metadata:
  name: n8n-rag-backend-https
  namespace: n8n-gateway
subsets:
  - addresses:
      - ip: 192.168.1.176
    ports:
      - name: https
        port: 443
        protocol: TCP

---
# HTTP backend — points to nginx stream proxy on .176 host (port 80)
# nginx on .176 forwards to the kind NodePort 30717 internally
apiVersion: v1
kind: Service
metadata:
  name: n8n-rag-backend-http
  namespace: n8n-gateway
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

---
apiVersion: v1
kind: Endpoints
metadata:
  name: n8n-rag-backend-http
  namespace: n8n-gateway
subsets:
  - addresses:
      - ip: 192.168.1.176
    ports:
      - name: http
        port: 80
        protocol: TCP
